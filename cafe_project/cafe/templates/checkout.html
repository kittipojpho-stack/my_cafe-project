{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-sm mx-auto" style="max-width: 500px; border-radius: 15px;">
        <div class="card-body">
            <h2 class="mb-4" style="color: #5d4037;">ชำระเงิน</h2>
            <p class="text-muted">สแกน QR Code ด้านล่างเพื่อชำระเงิน</p>
            
            <div class="py-3 text-center">
                <img src="{% static 'images/my_qr.jpg' %}" 
                    alt="PromptPay QR Code" 
                    style="width: 250px; border: 5px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            </div>

            <div class="alert alert-info mt-3">
                <h3 class="mb-0">ยอดชำระ: {{ total_price }} บาท</h3>
            </div>

            <p class="small text-danger mt-2">* เมื่อชำระเงินแล้ว ระบบจะดำเนินการทำออเดอร์ทันที</p>
            
            <form action="{% url 'complete_order' %}" method="POST" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-success btn-lg w-100">ฉันชำระเงินแล้ว</button>
            </form>
            
            <a href="{% url 'cart' %}" class="btn btn-link mt-2 text-decoration-none text-muted">ย้อนกลับไปตะกร้า</a>
        </div>
    </div>
</div>
{% endblock %}
