{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-4 text-center">
                    <h3 class="mb-4">🔐 พนักงานเข้าสู่ระบบ</h3>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="ชื่อผู้ใช้" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="password" class="form-control" placeholder="รหัสผ่าน" required>
                        </div>
                        {% if error %}
                            <p class="text-danger small">{{ error }}</p>
                        {% endif %}
                        <button type="submit" class="btn btn-primary w-100 py-2" style="background-color: #5d4037; border: none;">เข้าสู่ระบบ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
