{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cafe System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .navbar { background-color: #6f4e37; } /* สีน้ำตาลกาแฟ */
        .navbar-brand, .nav-link { color: white !important; }
        .hero-section { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); 
                        background-size: cover; height: 400px; color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">☕ My Cafe</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">หน้าหลัก</a>
                <a class="nav-link" href="/menu">เมนูอาหาร</a>
                {% if user.is_authenticated %}
                <li class="nav-item"><a class="nav-link" href="{% url 'sales_history' %}">ประวัติการขาย</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">แผงควบคุม</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="{% url 'logout' %}">ออกจากระบบ</a></li>
            {% else %}
                <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">ล็อกอินพนักงาน</a></li>
            {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="text-center py-4 mt-5 bg-dark text-white">
        <p>&copy; 2024 Cafe Management System - Database Project</p>
    </footer>
</body>
</html>
